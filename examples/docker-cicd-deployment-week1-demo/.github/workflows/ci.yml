name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ===== 前端构建检查 =====
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./examples/docker-cicd-deployment-week1-demo/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./examples/docker-cicd-deployment-week1-demo/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ===== 后端基础检查 =====
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./examples/docker-cicd-deployment-week1-demo/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./examples/docker-cicd-deployment-week1-demo/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start server & health check
        run: |
          node server.js &
          sleep 3
          curl -s http://localhost:3001/api/health | grep -q "healthy"
          echo "✅ Health check passed"

  # ===== Docker Compose 配置校验 =====
  compose-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        working-directory: ./examples/docker-cicd-deployment-week1-demo
        run: docker compose config --quiet
