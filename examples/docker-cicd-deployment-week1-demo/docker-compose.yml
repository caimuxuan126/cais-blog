services:
  # ===== Nginx 反向代理 =====
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ===== React 前端 =====
  frontend:
    build: ./frontend
    restart: unless-stopped

  # ===== Express 后端 =====
  backend:
    build: ./backend
    environment:
      PORT: 3001
      DATABASE_PATH: /app/data/deployments.db
    volumes:
      - blog-data:/app/data
    restart: unless-stopped

volumes:
  blog-data:
